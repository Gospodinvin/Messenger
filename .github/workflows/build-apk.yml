name: Build Android APK
on:
  workflow_dispatch: # Ручной запуск

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Получаем код
      - uses: actions/checkout@v4

      # 2. Устанавливаем Java
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Устанавливаем Node.js
      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 4. Устанавливаем зависимости проекта (!!! Обязательно !!!)
      - name: Install dependencies
        run: npm install

      # 5. Официальный action Expo. Он всё сделает сам.
      - uses: expo/expo-github-action@v8
        with:
          expo-version: 'latest'
          eas-version: 'latest'
          token: ${{ secrets.EXPO_TOKEN }}

      # 6. Сборка APK (можно использовать EAS или expo prebuild)
      - name: Build APK with EAS
        run: |
          eas build -p android --profile preview --local --output ./app.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }} # Токен нужен для EAS

      # 7. Загружаем артефакт
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app
          path: ./app.apk
