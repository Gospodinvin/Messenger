name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install
          npm install expo eas-cli

      - name: Create eas.json if missing
        run: |
          if [ ! -f eas.json ]; then
            echo '{"build":{"preview":{"android":{"buildType":"apk"}}}}' > eas.json
            echo "Created eas.json"
          else
            echo "eas.json already exists"
          fi

      - name: Prebuild (verbose)
        run: |
          npx expo prebuild --platform android --clean --non-interactive --verbose
          echo "Prebuild finished with exit code $?"

      - name: Build APK with Gradle (fallback)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --info

      - name: Upload APK if exists
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            ./app.apk
          if-no-files-found: warn
